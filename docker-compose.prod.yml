# ──────────────────────────────────────────────────────────
# Production Docker Compose
# Usage:  docker compose -f docker-compose.prod.yml up -d --build
# ──────────────────────────────────────────────────────────

services:
  # ─── Edge Reverse Proxy ──────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-proxy
    ports:
      - "${EXTERNAL_PORT:-80}:80"
      - "${EXTERNAL_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # mount certs here
      - certbot-webroot:/var/www/certbot:ro     # Let's Encrypt ACME
      - certbot-certs:/etc/letsencrypt:ro       # Let's Encrypt certs
    depends_on:
      - frontend
      - gateway
      - collab-editor
      - notification-service
    restart: unless-stopped
    networks:
      - microservices-network
    deploy:
      resources:
        limits:
          memory: 128M

  # ─── Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_WS_URL: ${VITE_WS_URL}
        VITE_NOTIFICATION_WS_URL: ${VITE_NOTIFICATION_WS_URL}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_USER_SERVICE_URL: ${VITE_USER_SERVICE_URL:-}
        VITE_COLLAB_EDITOR_URL: ${VITE_COLLAB_EDITOR_URL:-}
    container_name: frontend
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - microservices-network
    deploy:
      resources:
        limits:
          memory: 128M

  # ─── Databases ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M

  postgres-users:
    image: postgres:16-alpine
    container_name: postgres-users
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: users_db
    volumes:
      - pgdata-users:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  postgres-collab:
    image: postgres:16-alpine
    container_name: postgres-collab
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: collab_db
    volumes:
      - pgdata-collab:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  postgres-books:
    image: postgres:16-alpine
    container_name: postgres-books
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: books_db
    volumes:
      - pgdata-books:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  postgres-notifications:
    image: postgres:16-alpine
    container_name: postgres-notifications
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: notifications_db
    volumes:
      - pgdata-notifications:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── Backend Services ───────────────────────────────
  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile.prod
    container_name: user-service
    expose:
      - "3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-users:5432/users_db?connection_limit=20&pool_timeout=30
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_EXPIRES_IN: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: ${FRONTEND_URL}
      NODE_ENV: production
    depends_on:
      postgres-users:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - microservices-network
    volumes:
      - user-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile.prod
    container_name: api-gateway
    expose:
      - "3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      USER_SERVICE_URL: http://user-service:3001
      COLLAB_EDITOR_URL: http://collab-editor:4000
      BOOKS_SERVICE_URL: http://books-service:3002
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
      FRONTEND_URL: ${FRONTEND_URL}
      NODE_ENV: production
    depends_on:
      - redis
      - user-service
      - collab-editor
      - books-service
      - notification-service
    restart: unless-stopped
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  collab-editor:
    build:
      context: ./backend/collab-editor
      dockerfile: Dockerfile.prod
    container_name: collab-editor
    expose:
      - "4000"
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-collab:5432/collab_db?connection_limit=20&pool_timeout=30
      JWT_SECRET: ${JWT_SECRET}
      USER_SERVICE_URL: http://user-service:3001/api
      BOOKS_SERVICE_URL: http://books-service:3002
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
      FRONTEND_URL: ${FRONTEND_URL}
      NODE_ENV: production
    depends_on:
      postgres-collab:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - microservices-network
    volumes:
      - collab-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  books-service:
    build:
      context: ./backend/books-service
      dockerfile: Dockerfile.prod
    container_name: books-service
    expose:
      - "3002"
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-books:5432/books_db?connection_limit=20&pool_timeout=30
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      COLLAB_EDITOR_URL: http://collab-editor:4000
      FRONTEND_URL: ${FRONTEND_URL}
      NODE_ENV: production
    depends_on:
      postgres-books:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile.prod
    container_name: notification-service
    expose:
      - "3005"
    environment:
      PORT: 3005
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-notifications:5432/notifications_db?connection_limit=20&pool_timeout=30
      JWT_SECRET: ${JWT_SECRET}
      COLLAB_EDITOR_URL: http://collab-editor:4000
      USER_SERVICE_URL: http://user-service:3001
      FRONTEND_URL: ${FRONTEND_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-BookClubs <noreply@bookclubs.app>}
      APP_URL: ${APP_URL}
      NODE_ENV: production
    depends_on:
      postgres-notifications:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3005/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── Monitoring (optional — remove if not needed) ────
  loki:
    image: grafana/loki:latest
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - microservices-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── SSL Certificate Management ─────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    depends_on:
      - nginx
    # Run once to obtain/renew, then exit. 
    # Use: docker compose -f docker-compose.prod.yml run certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 6h & wait $${!}; certbot renew; done'"
    networks:
      - microservices-network

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - microservices-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - microservices-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3003:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki
    networks:
      - microservices-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  redis-data:
  pgdata-users:
  pgdata-collab:
  pgdata-books:
  pgdata-notifications:
  user-uploads:
  collab-uploads:
  prometheus-data:
  grafana-data:
  certbot-webroot:
  certbot-certs:

networks:
  microservices-network:
    driver: bridge
