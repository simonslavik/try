## Temporary nginx config — used ONLY for initial Let's Encrypt certificate setup.
## Once certs are obtained, switch to the full nginx.conf.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    upstream gateway {
        server api-gateway:3000;
    }

    upstream frontend {
        server frontend:80;
    }

    server {
        listen 80;
        server_name mybookclub.win www.mybookclub.win;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check
        location /health {
            proxy_pass http://gateway;
        }

        # Serve frontend temporarily over HTTP during SSL bootstrap
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API
        location /v1/ {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
