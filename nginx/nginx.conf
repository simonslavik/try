worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── General ────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Rate-limiting zone (10 req/s per IP)
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # ── Upstreams ──────────────────────────────────────
    upstream frontend {
        server frontend:80;
    }

    upstream gateway {
        server api-gateway:3000;
    }

    upstream collab_ws {
        server collab-editor:4000;
    }

    upstream notification_ws {
        server notification-service:3005;
    }

    # ── HTTP → HTTPS redirect (uncomment when SSL is ready) ──
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        server_name _;

        # ── Uncomment for SSL ──────────────────────────
        # listen 443 ssl http2;
        # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_prefer_server_ciphers on;

        # ── Security headers ───────────────────────────
        add_header X-Frame-Options        "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # ── API requests → Gateway ─────────────────────
        location /v1/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Gateway health check ──────────────────────
        location /health {
            proxy_pass http://gateway;
        }

        # ── Collab-editor WebSocket ────────────────────
        location /ws/collab {
            proxy_pass         http://collab_ws;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Notification WebSocket ─────────────────────
        location /ws/notifications {
            proxy_pass         http://notification_ws/ws;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Everything else → Frontend SPA ─────────────
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
