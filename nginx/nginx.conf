worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── General ────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # ── Gzip compression ──────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ── Rate-limiting zones ────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api:10m  rate=10r/s;
    limit_req_zone  $binary_remote_addr zone=auth:10m rate=5r/m;

    # ── WebSocket connection limits ────────────────────
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    # ── Upstreams ──────────────────────────────────────
    upstream frontend {
        server frontend:80;
    }

    upstream gateway {
        server api-gateway:3000;
    }

    upstream collab_ws {
        server collab-editor:4000;
    }

    upstream notification_ws {
        server notification-service:3005;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────
    server {
        listen 80;
        server_name _;

        # Allow health checks over plain HTTP
        location /health {
            proxy_pass http://gateway;
        }

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Main HTTPS server ─────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # ── SSL/TLS ────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security headers ───────────────────────────
        add_header X-Frame-Options            "SAMEORIGIN" always;
        add_header X-Content-Type-Options     "nosniff" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
        add_header X-XSS-Protection           "1; mode=block" always;

        # ── API requests → Gateway ─────────────────────
        location /v1/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Auth endpoints (stricter rate limit) ───────
        location /v1/auth/ {
            limit_req zone=auth burst=3 nodelay;

            proxy_pass         http://gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Gateway health check ──────────────────────
        location /health {
            proxy_pass http://gateway;
        }

        # ── Collab-editor WebSocket ────────────────────
        location /ws/collab {
            limit_conn ws_conn 5;

            proxy_pass         http://collab_ws;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Notification WebSocket ─────────────────────
        location /ws/notifications {
            limit_conn ws_conn 5;

            proxy_pass         http://notification_ws/ws;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Everything else → Frontend SPA ─────────────
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
