# ──────────────────────────────────────────────────────
# Deploy — Builds images and deploys on push to main/staging
# ──────────────────────────────────────────────────────
name: Deploy

on:
  push:
    branches: [main, staging]

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  # ── Set environment based on branch ────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      tag: ${{ steps.env.outputs.tag }}
      image_prefix: ${{ steps.env.outputs.image_prefix }}
    steps:
      - id: env
        run: |
          # Docker tags must be lowercase
          echo "image_prefix=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "tag=staging" >> "$GITHUB_OUTPUT"
          fi

  # ── Build & push Docker images ─────────────────────
  build-push:
    needs: setup
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            build-args: |
              VITE_API_URL=${{ vars.VITE_API_URL || 'https://mybookclub.win' }}
              VITE_WS_URL=${{ vars.VITE_WS_URL || 'wss://mybookclub.win/ws/collab' }}
              VITE_NOTIFICATION_WS_URL=${{ vars.VITE_NOTIFICATION_WS_URL || 'wss://mybookclub.win/ws/notifications' }}
              VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
          - name: gateway
            context: backend/gateway
            dockerfile: backend/gateway/Dockerfile.prod
          - name: user-service
            context: backend/user-service
            dockerfile: backend/user-service/Dockerfile.prod
          - name: books-service
            context: backend/books-service
            dockerfile: backend/books-service/Dockerfile.prod
          - name: collab-editor
            context: backend/collab-editor
            dockerfile: backend/collab-editor/Dockerfile.prod
          - name: notification-service
            context: backend/notification-service
            dockerfile: backend/notification-service/Dockerfile.prod
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.setup.outputs.image_prefix }}/${{ matrix.name }}:${{ needs.setup.outputs.tag }}
            ${{ env.REGISTRY }}/${{ needs.setup.outputs.image_prefix }}/${{ matrix.name }}:${{ github.sha }}
          build-args: ${{ matrix.build-args || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to server ───────────────────────────────
  deploy:
    needs: [setup, build-push]
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/,monitoring/"
          target: ~/app

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          TAG: ${{ needs.setup.outputs.tag }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ needs.setup.outputs.image_prefix }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: TAG,REGISTRY,IMAGE_PREFIX
          script: |
            DEPLOY_DIR="$HOME/app"
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            echo "── Deploy dir: $DEPLOY_DIR ──"
            echo "── Logging into GHCR ──"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Save CI-provided values before sourcing .env
            _TAG="$TAG"
            _REGISTRY="$REGISTRY"
            _IMAGE_PREFIX="$IMAGE_PREFIX"

            # ── Use fixed project name for volume consistency ──
            export COMPOSE_PROJECT_NAME="bookclub"
            echo "── Project name: $COMPOSE_PROJECT_NAME ──"

            # ── Find and source .env.production ──
            ENV_FILE=""
            for f in "$DEPLOY_DIR/.env.production" "$DEPLOY_DIR/.env" "$HOME/.env.production" "$HOME/BookClub-SocialMediaApp/.env.production" "$HOME/bookclub/.env.production"; do
              if [ -f "$f" ]; then
                ENV_FILE="$f"
                break
              fi
            done

            if [ -n "$ENV_FILE" ]; then
              echo "── Loading env from: $ENV_FILE ──"
              set -a
              . "$ENV_FILE"
              set +a
              cp "$ENV_FILE" "$DEPLOY_DIR/.env"
            else
              echo "ERROR: No .env.production found"
              find "$HOME" -maxdepth 4 -name '.env*' -not -path '*/node_modules/*' 2>/dev/null || true
              exit 1
            fi

            # Restore CI-provided values (must override .env.production)
            export TAG="$_TAG"
            export REGISTRY="$_REGISTRY"
            export IMAGE_PREFIX="$_IMAGE_PREFIX"

            echo "── Deploying: $REGISTRY/$IMAGE_PREFIX/*:$TAG ──"
            echo "── ENV check: POSTGRES_USER=${POSTGRES_USER:-MISSING} REDIS_PASSWORD=${REDIS_PASSWORD:+SET} JWT_SECRET=${JWT_SECRET:+SET} ──"

            # ── Ensure SSL certificates exist (non-fatal) ──
            echo "── Checking SSL certificates ──"
            if docker run --rm -v "${COMPOSE_PROJECT_NAME}_certbot-certs":/certs alpine test -f /certs/live/mybookclub.win/fullchain.pem 2>/dev/null; then
              echo "── SSL certs found (v1 volume) ──"
            elif docker run --rm -v "${COMPOSE_PROJECT_NAME}-certbot-certs":/certs alpine test -f /certs/live/mybookclub.win/fullchain.pem 2>/dev/null; then
              echo "── SSL certs found (v2 volume) ──"
            else
              echo "── No certs found, generating self-signed ──"
              docker run --rm -v "${COMPOSE_PROJECT_NAME}-certbot-certs":/etc/letsencrypt alpine sh -c "apk add --no-cache openssl >/dev/null 2>&1 && mkdir -p /etc/letsencrypt/live/mybookclub.win && openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /etc/letsencrypt/live/mybookclub.win/privkey.pem -out /etc/letsencrypt/live/mybookclub.win/fullchain.pem -subj '/CN=mybookclub.win' 2>/dev/null" || echo "── WARN: self-signed cert generation failed ──"
            fi
            echo "── SSL check done ──"

            # ── Stop conflicting containers ──
            echo "── Removing conflicting containers ──"
            CONTAINERS="nginx-proxy frontend api-gateway user-service books-service collab-editor notification-service redis-cache postgres-users postgres-collab postgres-books postgres-notifications loki promtail prometheus grafana certbot"
            for c in $CONTAINERS; do
              docker rm -f "$c" 2>/dev/null || true
            done

            # ── Pull and deploy (critical — fail on error) ──
            echo "── Pulling images ──"
            if ! docker compose -f docker-compose.prod.yml pull; then
              echo "ERROR: Failed to pull images"
              exit 1
            fi

            echo "── Starting services ──"
            if ! docker compose -f docker-compose.prod.yml up -d --remove-orphans; then
              echo "ERROR: Failed to start services"
              exit 1
            fi

            # Force nginx to reload config (bind mount may have changed)
            echo "── Reloading nginx config ──"
            sleep 5
            docker exec nginx-proxy nginx -s reload 2>/dev/null || true

            # Debug: show what nginx config is mounted
            echo "── Nginx config on disk: ──"
            head -10 "$DEPLOY_DIR/nginx/nginx.conf" 2>/dev/null || echo "FILE NOT FOUND"
            echo "── Nginx config in container: ──"
            docker exec nginx-proxy head -10 /etc/nginx/nginx.conf 2>/dev/null || echo "CONTAINER NOT FOUND"
            echo "── Checking for map directive (Cloudflare fix): ──"
            docker exec nginx-proxy grep -c 'real_scheme' /etc/nginx/nginx.conf 2>/dev/null || echo "NOT FOUND"

            # ── Health verification ──
            echo "── Waiting for services to start (30s) ──"
            sleep 30

            echo "── Container status ──"
            docker compose -f docker-compose.prod.yml ps

            RUNNING=$(docker compose -f docker-compose.prod.yml ps --format json 2>/dev/null | grep -c '"running"' || echo "0")
            echo "── Running containers: $RUNNING ──"

            if docker exec nginx-proxy nginx -t 2>/dev/null; then
              echo "── nginx config OK ──"
            else
              echo "── nginx config FAILED, showing logs: ──"
              docker logs nginx-proxy --tail 30 2>&1 || true
            fi

            HEALTH=$(docker exec nginx-proxy wget -qO- http://api-gateway:3000/health 2>/dev/null || echo "FAIL")
            echo "── Gateway health: $HEALTH ──"

            # Show logs of any crashed containers
            for c in $CONTAINERS; do
              STATUS=$(docker inspect -f '{{.State.Status}}' "$c" 2>/dev/null || echo "missing")
              if [ "$STATUS" != "running" ] && [ "$STATUS" != "missing" ]; then
                echo "── $c is $STATUS, last 10 log lines: ──"
                docker logs "$c" --tail 10 2>&1 || true
              fi
            done

            docker image prune -f > /dev/null 2>&1 || true

            # Final check - if nginx isn't running, fail the deploy
            if ! docker ps --format '{{.Names}}' | grep -q 'nginx-proxy'; then
              echo "DEPLOY FAILED: nginx-proxy is not running"
              docker ps -a --format 'table {{.Names}}\t{{.Status}}' | head -20
              exit 1
            fi

            echo "Deployed $TAG successfully"
