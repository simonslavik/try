# ──────────────────────────────────────────────────────
# Deploy — Builds images and deploys on push to main/staging
# ──────────────────────────────────────────────────────
name: Deploy

on:
  push:
    branches: [main, staging]

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  # ── Set environment based on branch ────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      tag: ${{ steps.env.outputs.tag }}
      image_prefix: ${{ steps.env.outputs.image_prefix }}
    steps:
      - id: env
        run: |
          # Docker tags must be lowercase
          echo "image_prefix=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "tag=staging" >> "$GITHUB_OUTPUT"
          fi

  # ── Build & push Docker images ─────────────────────
  build-push:
    needs: setup
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            build-args: |
              VITE_API_URL=${{ vars.VITE_API_URL || 'https://mybookclub.win' }}
              VITE_WS_URL=${{ vars.VITE_WS_URL || 'wss://mybookclub.win/ws/collab' }}
              VITE_NOTIFICATION_WS_URL=${{ vars.VITE_NOTIFICATION_WS_URL || 'wss://mybookclub.win/ws/notifications' }}
              VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
          - name: gateway
            context: backend/gateway
            dockerfile: backend/gateway/Dockerfile.prod
          - name: user-service
            context: backend/user-service
            dockerfile: backend/user-service/Dockerfile.prod
          - name: books-service
            context: backend/books-service
            dockerfile: backend/books-service/Dockerfile.prod
          - name: collab-editor
            context: backend/collab-editor
            dockerfile: backend/collab-editor/Dockerfile.prod
          - name: notification-service
            context: backend/notification-service
            dockerfile: backend/notification-service/Dockerfile.prod
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.setup.outputs.image_prefix }}/${{ matrix.name }}:${{ needs.setup.outputs.tag }}
            ${{ env.REGISTRY }}/${{ needs.setup.outputs.image_prefix }}/${{ matrix.name }}:${{ github.sha }}
          build-args: ${{ matrix.build-args || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to server ───────────────────────────────
  deploy:
    needs: [setup, build-push]
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/,monitoring/"
          target: ${{ vars.DEPLOY_PATH || '~/app' }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          TAG: ${{ needs.setup.outputs.tag }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ needs.setup.outputs.image_prefix }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: TAG,REGISTRY,IMAGE_PREFIX
          script_stop: true
          script: |
            DEPLOY_DIR="${{ vars.DEPLOY_PATH || '~/app' }}"
            cd "$DEPLOY_DIR"

            echo "── Logging into GHCR ──"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Save CI-provided values
            _TAG="$TAG"
            _REGISTRY="$REGISTRY"
            _IMAGE_PREFIX="$IMAGE_PREFIX"

            # Find and source .env.production (check multiple locations)
            ENV_FILE=""
            for f in "$DEPLOY_DIR/.env.production" "$HOME/.env.production" "$HOME/app/.env.production" "$HOME/BookClub-SocialMediaApp/.env.production" "$HOME/bookclub/.env.production"; do
              if [ -f "$f" ]; then
                ENV_FILE="$f"
                break
              fi
            done

            if [ -n "$ENV_FILE" ]; then
              echo "── Loading env from: $ENV_FILE ──"
              set -a
              . "$ENV_FILE"
              set +a
              # Copy to deploy dir if not already there
              if [ "$ENV_FILE" != "$DEPLOY_DIR/.env.production" ]; then
                cp "$ENV_FILE" "$DEPLOY_DIR/.env.production"
              fi
            else
              echo "⚠️  No .env.production found! Searching..."
              find "$HOME" -name '.env.production' -maxdepth 4 2>/dev/null || true
              find "$HOME" -name '.env' -maxdepth 4 2>/dev/null || true
              echo "ERROR: Cannot deploy without .env.production"
              exit 1
            fi

            # Restore CI-provided values (must override .env.production)
            export TAG="$_TAG"
            export REGISTRY="$_REGISTRY"
            export IMAGE_PREFIX="$_IMAGE_PREFIX"

            echo "── Deploying: $REGISTRY/$IMAGE_PREFIX/*:$TAG ──"
            echo "── ENV check: POSTGRES_USER=${POSTGRES_USER:-MISSING} REDIS_PASSWORD=${REDIS_PASSWORD:+SET} JWT_SECRET=${JWT_SECRET:+SET} ──"

            # Stop any existing containers that may conflict
            echo "── Removing conflicting containers ──"
            CONTAINERS="nginx-proxy frontend api-gateway user-service books-service collab-editor notification-service redis-cache postgres-users postgres-collab postgres-books postgres-notifications loki promtail prometheus grafana certbot"
            for c in $CONTAINERS; do
              docker rm -f "$c" 2>/dev/null || true
            done

            # Pull and deploy
            echo "── Pulling images ──"
            docker compose -f docker-compose.prod.yml pull

            echo "── Starting services ──"
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait and check status
            echo "── Waiting for services to start ──"
            sleep 15
            docker compose -f docker-compose.prod.yml ps

            # Cleanup old images
            docker image prune -f

            echo "✅ Deployed $TAG successfully"
