services:
  redis:
    image: redis:latest
    platform: linux/amd64
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - microservices-network

  # ─── Databases (one per service) ─────────────────────
  postgres-users:
    image: postgres:16-alpine
    platform: linux/amd64
    container_name: postgres-users
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: users_db
    volumes:
      - pgdata-users:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-collab:
    image: postgres:16-alpine
    platform: linux/amd64
    container_name: postgres-collab
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: collab_db
    volumes:
      - pgdata-collab:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-books:
    image: postgres:16-alpine
    platform: linux/amd64
    container_name: postgres-books
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: books_db
    volumes:
      - pgdata-books:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-notifications:
    image: postgres:16-alpine
    platform: linux/amd64
    container_name: postgres-notifications
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: notifications_db
    volumes:
      - pgdata-notifications:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: user-service
    expose:
      - "3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-users:5432/users_db?connection_limit=20&pool_timeout=30
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_EXPIRES_IN: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: development
    depends_on:
      postgres-users:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - microservices-network
    volumes:
      - ./backend/user-service:/app
      - /app/node_modules

  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
      USER_SERVICE_URL: http://user-service:3001
      COLLAB_EDITOR_URL: http://collab-editor:4000
      BOOKS_SERVICE_URL: http://books-service:3002
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
      FRONTEND_URL: http://localhost:5173
      NODE_ENV: development
    depends_on:
      - redis
      - user-service
      - collab-editor
      - books-service
      - notification-service
    restart: unless-stopped
    networks:
      - microservices-network
    volumes:
      - ./backend/gateway:/app
      - /app/node_modules

  collab-editor:
    build:
      context: ./backend/collab-editor
      dockerfile: Dockerfile
    container_name: collab-editor
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-collab:5432/collab_db?connection_limit=20&pool_timeout=30
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET}
      USER_SERVICE_URL: http://user-service:3001/api
      BOOKS_SERVICE_URL: http://books-service:3002
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
    depends_on:
      postgres-collab:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - microservices-network
    volumes:
      - ./backend/collab-editor:/app
      - /app/node_modules

  books-service:
    build:
      context: ./backend/books-service
      dockerfile: Dockerfile
    container_name: books-service
    expose:
      - "3002"
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-books:5432/books_db?connection_limit=20&pool_timeout=30
      NODE_ENV: development
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY}
      REDIS_URL: redis://redis:6379
      COLLAB_EDITOR_URL: http://collab-editor:4000
    depends_on:
      postgres-books:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - microservices-network
    volumes:
      - ./backend/books-service:/app
      - /app/node_modules
    labels:
      logging: "promtail"
      service_name: "books-service"

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "3005:3005"
    expose:
      - "3005"
    environment:
      PORT: 3005
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-notifications:5432/notifications_db?connection_limit=20&pool_timeout=30
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET}
      COLLAB_EDITOR_URL: http://collab-editor:4000
      USER_SERVICE_URL: http://user-service:3001
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-BookClubs <noreply@bookclubs.app>}
      APP_URL: ${APP_URL:-http://localhost:5173}
    depends_on:
      postgres-notifications:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - microservices-network
    volumes:
      - ./backend/notification-service:/app
      - /app/node_modules
    labels:
      logging: "promtail"
      service_name: "notification-service"

  # Monitoring & Logging Stack
  loki:
    image: grafana/loki:latest
    platform: linux/amd64
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - microservices-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    platform: linux/amd64
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - microservices-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    platform: linux/amd64
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - microservices-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    platform: linux/amd64
    container_name: grafana
    ports:
      - "3003:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki
    networks:
      - microservices-network
    restart: unless-stopped

volumes:
  redis-data:
  pgdata-users:
  pgdata-collab:
  pgdata-books:
  pgdata-notifications:
  prometheus-data:
  grafana-data:

networks:
  microservices-network:
    driver: bridge
